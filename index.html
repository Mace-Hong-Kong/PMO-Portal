<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NDO PMO Analytics</title>

    <link rel="preconnect" href="https://app.powerbi.com" crossorigin />
    <link rel="preconnect" href="https://login.microsoftonline.com" crossorigin />
    <link rel="preconnect" href="https://aadcdn.msauth.net" crossorigin />
    <link rel="dns-prefetch" href="https://app.powerbi.com" />
    <link rel="dns-prefetch" href="https://login.microsoftonline.com" />

    <script>
      const POWER_BI_URL =
        "https://app.powerbi.com/groups/me/apps/27a310ca-809f-4fd0-8201-40e10da610ba/reports/1fa00f30-4129-4525-85fa-dcba8063b644?ctid=f9300280-65a0-46f8-a18c-a296431980f5&experience=power-bi";

      const TOTAL_DELAY_MS = 1500;
      const SESSION_KEY = "pmo-portal:redirected";

      // sessionStorage can throw (Safari private mode, strict cookie policies,
      // some embedded WebViews, file:// origins). Treat any failure as
      // "first visit" so the interstitial still works.
      function hasVisited() {
        try {
          return sessionStorage.getItem(SESSION_KEY) === "1";
        } catch (_) {
          return false;
        }
      }
      function markVisited() {
        try {
          sessionStorage.setItem(SESSION_KEY, "1");
        } catch (_) {
          /* storage unavailable; safe to ignore */
        }
      }

      // Returning visitors in the same session skip the interstitial entirely.
      if (hasVisited()) {
        window.location.replace(POWER_BI_URL);
      } else {
        markVisited();

        // Anchor to navigation start so total time-to-redirect is constant
        // regardless of how long the page itself took to load.
        window.addEventListener("DOMContentLoaded", () => {
          const elapsed = performance.now();
          const remaining = Math.max(0, TOTAL_DELAY_MS - elapsed);

          const bar = document.getElementById("progress-bar");
          if (bar) {
            bar.setAttribute("aria-valuenow", "0");
            bar.style.transitionDuration = remaining + "ms";
            requestAnimationFrame(() => {
              bar.style.width = "100%";
              bar.setAttribute("aria-valuenow", "100");
            });
          }

          setTimeout(() => {
            window.location.replace(POWER_BI_URL);
          }, remaining);
        });
      }
    </script>

    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 640px;
        margin: 4rem auto;
        padding: 0 1rem;
        color: #222;
      }
      .stack > * {
        margin: 0;
      }
      .stack > * + * {
        margin-top: 1rem;
      }
      a.button {
        display: inline-block;
        padding: 0.75rem 1.25rem;
        background: #0078d4;
        color: #fff;
        text-decoration: none;
        border-radius: 6px;
      }
      a.button:hover {
        background: #106ebe;
      }
      a.button:focus-visible {
        outline: 3px solid #106ebe;
        outline-offset: 2px;
      }
      .progress {
        height: 4px;
        width: 100%;
        background: #eaeaea;
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        background: #0078d4;
        transition: width linear;
      }
    </style>
  </head>
  <body>
    <main class="stack">
      <div class="progress">
        <div
          id="progress-bar"
          class="progress-bar"
          role="progressbar"
          aria-label="Redirect progress"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        ></div>
      </div>
      <p role="status" aria-live="polite">
        You are being redirected to the Power BI dashboard shortly.
      </p>
      <a
        class="button"
        href="https://app.powerbi.com/groups/me/apps/27a310ca-809f-4fd0-8201-40e10da610ba/reports/1fa00f30-4129-4525-85fa-dcba8063b644?ctid=f9300280-65a0-46f8-a18c-a296431980f5&experience=power-bi"
        >Open dashboard now →</a
      >
    </main>
    <noscript>
      <p>JavaScript is disabled. Use the button above to open the dashboard.</p>
    </noscript>
  </body>
</html>
